name: Delete all workflow runs

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all workflow runs
        run: |
          gh api repos/${{ github.repository }}/actions/runs --paginate -q '.workflow_runs[].id' | \
          xargs -I {} gh api -X DELETE repos/${{ github.repository }}/actions/runs/{}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
